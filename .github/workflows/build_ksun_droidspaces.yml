name: Build KSUN + DroidSpaces
run-name: Build KernelSU-Next + DroidSpaces
on:
  workflow_dispatch:
    inputs:
      phone:
        description: '选择手机型号：'
        required: true
        default: '小米10'
        type: choice
        options:
          - 小米10
          - 小米10Pro

jobs:
  build_job:
    runs-on: ubuntu-22.04
    steps:

      - name: 1.拉取编译链
        run: |
          mkdir -p $GITHUB_WORKSPACE/kernel_workspace
          cd $GITHUB_WORKSPACE/kernel_workspace
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/19.0.0git-20240125-release/Clang-19.0.0git-20240125.tar.gz
          mkdir -p clang
          tar -xzf Clang-19.0.0git-20240125.tar.gz -C clang

      - name: 2.拉取源码
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone https://github.com/clcwpwqi/kernel_xiaomi_sm8250_n0kernel --depth=1 android_kernel
          git clone https://github.com/clcwpwqi/kernel.git src

      - name: 3.添加KernelSU Next
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android_kernel
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next-susfs/kernel/setup.sh" | bash -s next-susfs

      - name: 4.添加 DroidSpaces 配置
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android_kernel
          echo "🚀 添加 DroidSpaces 配置..."
          echo "" >> arch/arm64/configs/vendor/umi_defconfig
          echo "# DroidSpaces Support" >> arch/arm64/configs/vendor/umi_defconfig
          echo "CONFIG_NAMESPACES=y" >> arch/arm64/configs/vendor/umi_defconfig
          echo "CONFIG_UTS_NS=y" >> arch/arm64/configs/vendor/umi_defconfig
          echo "CONFIG_IPC_NS=y" >> arch/arm64/configs/vendor/umi_defconfig
          echo "CONFIG_PID_NS=y" >> arch/arm64/configs/vendor/umi_defconfig
          echo "CONFIG_NET_NS=y" >> arch/arm64/configs/vendor/umi_defconfig
          echo "CONFIG_CGROUPS=y" >> arch/arm64/configs/vendor/umi_defconfig
          echo "CONFIG_CGROUP_DEVICE=y" >> arch/arm64/configs/vendor/umi_defconfig
          echo "CONFIG_OVERLAY_FS=y" >> arch/arm64/configs/vendor/umi_defconfig
          echo "CONFIG_USER_NS=y" >> arch/arm64/configs/vendor/umi_defconfig
          echo "CONFIG_VETH=y" >> arch/arm64/configs/vendor/umi_defconfig
          echo "CONFIG_BRIDGE=y" >> arch/arm64/configs/vendor/umi_defconfig
          echo "CONFIG_ANDROID_PARANOID_NETWORK=n" >> arch/arm64/configs/vendor/umi_defconfig
          echo "✅ DroidSpaces 配置已追加"
          tail -n 20 arch/arm64/configs/vendor/umi_defconfig

      - name: 5.开始构建 (小米10)
        run: |
          export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang/bin:$PATH
          cd $GITHUB_WORKSPACE/kernel_workspace/android_kernel
          DEFCONFIG=vendor/umi_defconfig
          make -j$(nproc --all) CC=clang O=out ARCH=arm64 CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-buildroot-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-androideabi- $DEFCONFIG
          make -j8 CC=clang O=out ARCH=arm64 CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi-

      - name: 6.打包上传
        uses: actions/upload-artifact@v4
        with:
          name: umi-KernelSU-Next-DroidSpaces
          path: kernel_workspace/android_kernel/out/arch/arm64/boot/Image*
